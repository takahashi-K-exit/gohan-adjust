<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月1ご飯会 日程調整</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      margin: 0 auto;
      max-width: 500px;
      padding: 20px;
      background-color: #f9f9f9;
      color: #333;
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      color: #444;
      margin-bottom: 5px;
    }

    .description {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 20px;
    }

    .month-selector-container {
      text-align: center;
      margin-bottom: 20px;
    }
    .month-input {
      font-size: 1.2rem;
      padding: 8px 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      font-family: inherit;
      cursor: pointer;
    }

    .input-container {
      margin-bottom: 20px;
    }
    .text-input {
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus {
      border-color: #007BFF;
    }

    .calendar-container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      padding: 15px;
      margin-bottom: 20px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .dow-header {
      text-align: center;
      font-weight: bold;
      font-size: 0.85rem;
      padding-bottom: 10px;
    }
    .dow-sun { color: #cc0000; }
    .dow-sat { color: #0066cc; }

    .calendar-cell {
      aspect-ratio: 1 / 1;
      border: 2px solid #f0f0f0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s ease;
      background-color: #fafafa;
    }

    .calendar-cell.empty {
      background-color: transparent;
      border: none;
      cursor: default;
    }

    .date-num {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 2px;
    }
    
    .status-mark {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .cell-none { border-color: #f0f0f0; }
    .cell-none .status-mark { color: #ccc; }
    
    .cell-ok { background-color: #e8f5e9; border-color: #4CAF50; }
    .cell-ok .status-mark { color: #4CAF50; }
    
    .cell-maybe { background-color: #fffde7; border-color: #FFEB3B; }
    .cell-maybe .status-mark { color: #F57F17; }
    
    .cell-ng { background-color: #ffebee; border-color: #F44336; }
    .cell-ng .status-mark { color: #F44336; }

    .submit-btn {
      display: block;
      width: 100%;
      padding: 15px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
    .submit-btn:disabled {
      background-color: #aaa;
      cursor: not-allowed;
    }

    .result-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #007BFF;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>ご飯会 日程調整</h1>
  <p class="description">名前を入力して、日付をタップしてね！<br><span style="font-size: 0.8rem; color:#999;">※同じ名前で送信すると上書きされます</span></p>

  <div class="month-selector-container">
    <input type="month" id="month-select" class="month-input">
  </div>

  <div class="input-container">
    <input type="text" id="user-name" class="text-input" placeholder="あなたのお名前（例: たろう）">
  </div>

  <div class="calendar-container" id="calendar-container"></div>

  <div class="input-container">
    <input type="text" id="user-comment" class="text-input" placeholder="ひとこと（例: 20時以降なら行けます！）">
  </div>

  <button class="submit-btn" id="submit-btn">回答を送信する</button>

  <a href="result.html" class="result-link">みんなの回答を見る →</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2saweTXZ7Qxc8n3pBNueS15z-EJWiCv8",
      authDomain: "gohan-adjust-62272.firebaseapp.com",
      projectId: "gohan-adjust-62272",
      storageBucket: "gohan-adjust-62272.firebasestorage.app",
      messagingSenderId: "1027529556388",
      appId: "1:1027529556388:web:5f2d239bb1c9ea1ed1c131"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let answers = {};
    const dayOfWeekStr = ["日", "月", "火", "水", "木", "金", "土"];

    function generateCalendar(year, month) {
      const container = document.getElementById('calendar-container');
      container.innerHTML = '';
      answers = {};

      const grid = document.createElement('div');
      grid.className = 'calendar-grid';

      const dows = [
        { text: "日", class: "dow-sun" },
        { text: "月", class: "" },
        { text: "火", class: "" },
        { text: "水", class: "" },
        { text: "木", class: "" },
        { text: "金", class: "" },
        { text: "土", class: "dow-sat" }
      ];
      
      dows.forEach(d => {
        const dowEl = document.createElement('div');
        dowEl.className = `dow-header ${d.class}`;
        dowEl.textContent = d.text;
        grid.appendChild(dowEl);
      });

      const firstDayDow = new Date(year, month - 1, 1).getDay();
      const lastDay = new Date(year, month, 0).getDate();

      for (let i = 0; i < firstDayDow; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'calendar-cell empty';
        grid.appendChild(emptyCell);
      }

      for (let i = 1; i <= lastDay; i++) {
        const dateObj = new Date(year, month - 1, i);
        const dowStr = dayOfWeekStr[dateObj.getDay()];
        const dateKey = `${month}月${i}日 (${dowStr})`;
        
        answers[dateKey] = 'none';

        const cell = document.createElement('div');
        cell.className = 'calendar-cell cell-none';

        const numDiv = document.createElement('div');
        numDiv.className = 'date-num';
        numDiv.textContent = i;
        if (dateObj.getDay() === 0) numDiv.style.color = '#cc0000';
        if (dateObj.getDay() === 6) numDiv.style.color = '#0066cc';

        const markDiv = document.createElement('div');
        markDiv.className = 'status-mark';
        markDiv.textContent = 'ー';

        cell.appendChild(numDiv);
        cell.appendChild(markDiv);

        cell.onclick = function() {
          if (answers[dateKey] === 'none') {
            answers[dateKey] = 'ok';
            cell.className = 'calendar-cell cell-ok';
            markDiv.textContent = '◯';
          } else if (answers[dateKey] === 'ok') {
            answers[dateKey] = 'maybe';
            cell.className = 'calendar-cell cell-maybe';
            markDiv.textContent = '△';
          } else if (answers[dateKey] === 'maybe') {
            answers[dateKey] = 'ng';
            cell.className = 'calendar-cell cell-ng';
            markDiv.textContent = '×';
          } else if (answers[dateKey] === 'ng') {
            answers[dateKey] = 'none';
            cell.className = 'calendar-cell cell-none';
            markDiv.textContent = 'ー';
          }
        };

        grid.appendChild(cell);
      }

      container.appendChild(grid);
    }

    const monthInput = document.getElementById('month-select');
    const today = new Date();
    let y = today.getFullYear();
    let m = today.getMonth() + 2; 
    if (m > 12) {
      m -= 12;
      y++;
    }
    
    const defaultMonthStr = `${y}-${m.toString().padStart(2, '0')}`;
    monthInput.value = defaultMonthStr;
    
    generateCalendar(y, m);

    monthInput.addEventListener('change', function(e) {
      if (!e.target.value) return; 
      const [selectedYear, selectedMonth] = e.target.value.split('-');
      generateCalendar(parseInt(selectedYear), parseInt(selectedMonth));
    });

    async function submitAnswers() {
      const userName = document.getElementById('user-name').value.trim();
      const userComment = document.getElementById('user-comment').value.trim(); // コメントを取得
      const targetMonth = document.getElementById('month-select').value;
      const submitBtn = document.getElementById('submit-btn');

      if (userName === "") {
        alert("お名前を入力してください！");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "送信中...";

      try {
        const docId = `${targetMonth}_${userName}`;
        const docRef = doc(db, "responses", docId);

        await setDoc(docRef, {
          userName: userName,
          targetMonth: targetMonth,
          answers: answers,
          comment: userComment, // コメントをデータベースに保存
          updatedAt: serverTimestamp()
        });

        alert("回答を送信しました！");
        document.getElementById('user-name').value = "";
        document.getElementById('user-comment').value = ""; // 送信後にコメント欄も空にする
        
      } catch (error) {
        console.error("エラーが発生しました:", error);
        alert("送信に失敗しました。");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "回答を送信する";
      }
    }

    document.getElementById('submit-btn').addEventListener('click', submitAnswers);
  </script>
</body>
</html>
